<!DOCTYPE html>

<html lang="ja">

<head>

    <meta charset="UTF-8">

    <title>ETERNAL GRIND - TRUE REBORN</title>

    <style>

        :root { --neon-blue: #00f2ff; --neon-pink: #ff00ff; --neon-gold: #ffcc00; }

        * { box-sizing: border-box; }

        body { background: #000; color: #fff; font-family: 'Hiragino Kaku Gothic Pro', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }

        

        #game-outer { position: relative; width: 420px; height: 800px; padding: 10px; }

        #game-container { 

            width: 100%; height: 100%; background: radial-gradient(circle at center, #222 0%, #000 100%); 

            border: 4px solid #444; border-radius: 40px; position: relative; display: flex; flex-direction: column; 

            box-shadow: 0 0 50px rgba(0,0,0,1); overflow: hidden; 

        }



        .screen { display: none; flex-direction: column; align-items: center; padding: 30px 20px; height: 100%; width: 100%; }

        .active { display: flex; }



        /* モンスター・ステージ（ここが命） */

        .monster-stage { 

            height: 320px; width: 100%; display: flex; justify-content: center; 

            align-items: center; position: relative; margin: 10px 0;

        }

        .aura { position: absolute; width: 240px; height: 240px; border-radius: 50%; filter: blur(35px); opacity: 0.6; z-index: 1; transition: 0.5s; }

        .monster-emoji { font-size: 120px; z-index: 10; transition: 0.3s; }

        

        /* 敵が現れる時のオーバーレイ */

        #enemy-wrap { position: absolute; top: 0; width: 100%; height: 100%; display: none; justify-content: center; align-items: center; z-index: 20; }



        /* 卵のアニメーション復活 */

        .egg-visual { font-size: 80px; margin-bottom: 15px; animation: bounce 1.5s infinite ease-in-out; }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }



        /* ボタン・UI */

        .btn { 

            background: rgba(0,0,0,0.8); border: 2px solid var(--neon-blue); color: var(--neon-blue); 

            padding: 15px; margin: 6px; border-radius: 12px; cursor: pointer; font-weight: bold; 

            width: 100%; transition: 0.1s; font-size: 1rem;

        }

        .btn:active { transform: scale(0.95); box-shadow: 0 0 15px var(--neon-blue); }

        .btn-evolve { border-color: var(--neon-gold); color: var(--neon-gold); }



        #log { 

            flex: 1; width: 100%; background: rgba(255,255,255,0.05); color: #ccc; 

            font-size: 0.9rem; padding: 15px; border-top: 2px solid #333; overflow-y: auto; text-align: left;

        }



        /* 図鑑グリッド */

        #col-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; padding: 10px; }

        .col-item { background: #111; border: 1px solid #333; padding: 10px; text-align: center; border-radius: 10px; font-size: 0.7rem; }

        .unlocked { border-color: var(--neon-blue); color: #fff; }



        .shake { animation: shake-anim 0.2s ease-in-out; }

        @keyframes shake-anim { 0%,100%{transform:translate(0,0);} 25%{transform:translate(8px,8px);} 50%{transform:translate(-8px,-8px);} }

        

        .atk-motion { animation: atk-move 0.3s ease-in-out; }

        @keyframes atk-move { 0% { transform: scale(1); } 50% { transform: scale(1.3) translateY(-20px); } 100% { transform: scale(1); } }

    </style>

</head>

<body>



<div id="game-outer">

    <div id="game-container">

        

        <div id="screen-title" class="screen active">

            <h1 style="font-size: 3.5rem; color: var(--neon-pink); text-shadow: 0 0 20px var(--neon-pink); margin: 0;">ETERNAL</h1>

            <h1 style="font-size: 3.5rem; color: var(--neon-blue); text-shadow: 0 0 20px var(--neon-blue); margin-top: -10px;">GRIND</h1>

            <div style="margin-top: 50px; width: 80%;">

                <button class="btn" onclick="showScreen('screen-select')">START GAME</button>

                <button class="btn" onclick="openCollection()" style="border-color:var(--neon-gold); color:var(--neon-gold);">COLLECTION</button>

            </div>

        </div>



        <div id="screen-col" class="screen">

            <h2 style="color:var(--neon-gold)">COLLECTION</h2>

            <div id="col-grid"></div>

            <button class="btn" onclick="showScreen('screen-title')" style="margin-top:20px;">BACK</button>

        </div>



        <div id="screen-select" class="screen">

            <h2 style="color:var(--neon-gold)">SELECT GENE</h2>

            <div style="display:flex; justify-content:space-around; width:100%; margin-top:40px;">

                <div onclick="hatch('CASINO')" style="cursor:pointer; text-align:center;">

                    <div class="egg-visual">🥚</div>

                    <div style="color:var(--neon-blue); font-weight:bold;">CASINO</div>

                </div>

                <div onclick="hatch('CYBER')" style="cursor:pointer; text-align:center;">

                    <div class="egg-visual">🥚</div>

                    <div style="color:var(--neon-pink); font-weight:bold;">CYBER</div>

                </div>

                <div onclick="hatch('SLIME')" style="cursor:pointer; text-align:center;">

                    <div class="egg-visual">🥚</div>

                    <div style="color:var(--neon-gold); font-weight:bold;">SLIME</div>

                </div>

            </div>

        </div>



        <div id="screen-main" class="screen">

            <div id="p-title" style="color: var(--neon-gold); height: 1.5rem; font-size: 1rem;"></div>

            <div id="p-name" style="font-size: 2.2rem; font-weight: bold;"></div>

            

            <div class="monster-stage">

                <div id="p-aura" class="aura"></div>

                <div id="p-emoji" class="monster-emoji">🐣</div>

                <div id="enemy-wrap"><div id="enemy-emoji" style="font-size: 100px; filter: drop-shadow(0 0 20px red);">👿</div></div>

            </div>



            <div style="display: flex; gap: 20px; color: var(--neon-gold); font-weight: bold; margin-bottom: 15px; font-size: 1.1rem;">

                <span>LV.<span id="p-lv">1</span></span>

                <span>HP:<span id="p-hp">100</span></span>

                <span>ATK:<span id="p-atk">10</span></span>

            </div>



            <div style="display: grid; grid-template-columns: 1fr 1fr; width: 100%; gap: 5px;">

                <button class="btn" onclick="action('food')">FEED</button>

                <button class="btn" onclick="action('train')">TRAIN</button>

                <button class="btn btn-evolve" onclick="evolve()" style="grid-column: span 2;">EVOLVE</button>

            </div>

            <div id="log"></div>

        </div>



        <div id="screen-over" class="screen">

            <h1 style="color:red; font-size: 4rem;">DEATH</h1>

            <p id="over-desc" style="text-align:center; padding: 20px; color: #ccc;"></p>

            <button class="btn" onclick="location.reload()">RETRY</button>

        </div>

    </div>

</div>



<script>

const MONSTER_MASTER = {

    CASINO: [{n:"子猫", e:"🐱"}, {n:"チンピラ猫", e:"🕶️"}, {n:"用心棒猫", e:"👔"}, {n:"スロット猫", e:"🎰"}, {n:"カジノ神", e:"💰"}],

    CYBER: [{n:"ビット卵", e:"🥚"}, {n:"コードベビ", e:"👾"}, {n:"プロトドロ", e:"🤖"}, {n:"守護機甲", e:"🛡️"}, {n:"機神オメガ", e:"👑"}],

    SLIME: [{n:"ベビスラ", e:"💧"}, {n:"スライム", e:"🔵"}, {n:"キングスラ", e:"👑"}, {n:"メタルスラ", e:"💎"}, {n:"プラチナK", e:"✨"}]

};

const TITLES = ["風来の", "黄金の", "奈落の", "禁忌の", "伝説の", "超越した"];

const AURA_COLORS = [{name:"", color:"transparent", power:0}, {name:"白", color:"#fff", power:1}, {name:"青", color:"#36f", power:2}, {name:"緑", color:"#3f3", power:3}, {name:"赤", color:"#f33", power:4}, {name:"虹", color:"rainbow", power:5}];



let state = {

    type:"", lv:1, n:"", e:"🐣", title:"", 

    color:AURA_COLORS[0], hp:100, atk:10, food:0, train:0,

    collection: JSON.parse(localStorage.getItem('grind_collection_v2') || '{}')

};



function showScreen(id) {

    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

    document.getElementById(id).classList.add('active');

}



function hatch(type) {

    state.type = type;

    const d = MONSTER_MASTER[type][0];

    state.n = d.n; state.e = d.e;

    showScreen('screen-main');

    updateUI();

}



function updateUI() {

    document.getElementById('p-title').innerText = state.title ? `【${state.title}】` : "";

    document.getElementById('p-name').innerText = state.n;

    document.getElementById('p-emoji').innerText = state.e;

    document.getElementById('p-lv').innerText = state.lv;

    document.getElementById('p-hp').innerText = state.hp;

    document.getElementById('p-atk').innerText = state.atk;

    

    const aura = document.getElementById('p-aura');

    const nameDisp = document.getElementById('p-name');



    // 名前の輝きとオーラ

    if(state.color.name === "虹") {

        nameDisp.style.background = "linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet)";

        nameDisp.style.webkitBackgroundClip = "text"; nameDisp.style.webkitTextFillColor = "transparent";

        aura.style.background = "linear-gradient(45deg, red, blue, green)";

    } else {

        nameDisp.style.color = state.color.power > 0 ? state.color.color : "#fff";

        nameDisp.style.webkitTextFillColor = "initial"; nameDisp.style.background = "none";

        aura.style.background = state.color.color;

    }

    aura.style.opacity = state.color.power > 0 ? "0.6" : "0";



    // コレクション保存

    if(!state.collection[state.n]) {

        state.collection[state.n] = true;

        localStorage.setItem('grind_collection_v2', JSON.stringify(state.collection));

    }

}



async function evolve() {

    triggerShake();

    // 生存判定

    if(Math.random() > (0.75 + state.food * 0.05)) {

        die("成長の負荷により、体が耐えきれず霧散しました。"); return;

    }



    // 突発バトル演出 (15%)

    if(Math.random() < 0.15) {

        await playBattle();

    }



    state.lv++;

    let chance = Math.max(0.05, 0.4 * (1 - (state.lv - 2) * 0.1));

    if(Math.random() < chance) {

        const list = MONSTER_MASTER[state.type];

        const idx = list.findIndex(m => m.n === state.n);

        if(idx < list.length - 1) { 

            state.n = list[idx+1].n; state.e = list[idx+1].e; 

            addLog(`進化成功！【${state.n}】になりました。`);

        }

    }

    

    // オーラ・二つ名

    if(Math.random() < 0.3) {

        let r = Math.random();

        let nc = r < 0.05 ? AURA_COLORS[5] : r < 0.15 ? AURA_COLORS[4] : r < 0.3 ? AURA_COLORS[3] : r < 0.6 ? AURA_COLORS[2] : AURA_COLORS[1];

        if(nc.power > state.color.power) state.color = nc;

    }

    if(Math.random() < 0.15) state.title = TITLES[Math.floor(Math.random()*TITLES.length)];



    state.hp += 20; state.atk += 5 + state.train;

    state.food = 0; state.train = 0;

    updateUI();

}



async function playBattle() {

    const wrap = document.getElementById('enemy-wrap');

    const pEmoji = document.getElementById('p-emoji');

    addLog("!!! 野生のアウトローが絡んできた！");

    wrap.style.display = "flex";

    

    for(let i=0; i<2; i++) {

        await new Promise(r => setTimeout(r, 400));

        pEmoji.classList.add('atk-motion');

        triggerShake();

        await new Promise(r => setTimeout(r, 300));

        pEmoji.classList.remove('atk-motion');

    }

    

    addLog("圧倒的武力で追い払った！ステータスUP！");

    state.atk += 15;

    wrap.style.display = "none";

}



function action(t) {

    triggerShake();

    if(Math.random() < 0.03) { die("運悪く命を落としました。"); return; }

    if(t==='food') { state.food++; addLog("エサを完食。生存率が上がった気がする。"); }

    else { state.train++; addLog("厳しい訓練をこなした。"); }

    updateUI();

}



function openCollection() {

    const grid = document.getElementById('col-grid');

    grid.innerHTML = "";

    Object.values(MONSTER_MASTER).flat().forEach(m => {

        const div = document.createElement('div');

        div.className = `col-item ${state.collection[m.n] ? 'unlocked' : ''}`;

        div.innerHTML = state.collection[m.n] ? `${m.e}<br>${m.n}` : `？<br>???`;

        grid.appendChild(div);

    });

    showScreen('screen-col');

}



function die(r) {

    document.getElementById('over-desc').innerText = r + "\nLv." + state.lv + "で生涯を閉じました。";

    showScreen('screen-over');

}

function addLog(m) { const l = document.getElementById('log'); l.innerHTML = `> ${m}<br>` + l.innerHTML; }

function triggerShake() { 

    const o = document.getElementById('game-outer');

    o.classList.add('shake'); setTimeout(()=>o.classList.remove('shake'), 200);

}

</script>

</body>

</html>

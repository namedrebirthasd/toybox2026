<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEON CORE GACHA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{
background:radial-gradient(circle at center,#0f2027,#203a43,#000);
height:100vh;display:flex;justify-content:center;align-items:center;
color:white;overflow:hidden;
}
.container{text-align:center;position:relative;width:100%;}
.title{
font-size:40px;letter-spacing:4px;
background:linear-gradient(90deg,#0ff,#f0f,#0ff);
background-size:200%;
-webkit-background-clip:text;color:transparent;
animation:glow 4s linear infinite;
}
@keyframes glow{
0%{background-position:0%}
100%{background-position:200%}
}
.gacha-ball{
width:200px;height:200px;border-radius:50%;
margin:40px auto;
background:radial-gradient(circle,#ccc,#888);
box-shadow:0 0 40px rgba(255,255,255,.3);
display:flex;justify-content:center;align-items:center;
font-size:20px;color:#222;
transition:.3s;
cursor:pointer;
}
.gacha-ball.shake{animation:shake .5s infinite;}
@keyframes shake{
0%{transform:rotate(0deg)}
25%{transform:rotate(3deg)}
50%{transform:rotate(-3deg)}
75%{transform:rotate(2deg)}
100%{transform:rotate(0deg)}
}
.button{
padding:15px 40px;
background:linear-gradient(45deg,#0ff,#f0f);
border:none;border-radius:30px;
color:#000;font-weight:bold;font-size:18px;
cursor:pointer;transition:.3s;
}
.button:hover{transform:scale(1.1);}
.result{
font-size:30px;margin-top:20px;height:40px;
}
.score{
margin-top:10px;font-size:16px;opacity:.8;
}
.particle{
position:absolute;border-radius:50%;pointer-events:none;
animation:explode 1s forwards;
}
@keyframes explode{
to{transform:translate(var(--x),var(--y)) scale(0);opacity:0;}
}
.flash{
position:absolute;width:100%;height:100%;
background:white;opacity:0;pointer-events:none;
}
.flash.active{animation:flash .4s;}
@keyframes flash{
0%{opacity:0}
50%{opacity:.8}
100%{opacity:0}
}
.reset{
position:absolute;bottom:20px;right:20px;
font-size:12px;opacity:.6;cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
<div class="flash" id="flash"></div>
<div class="title">NEON CORE</div>
<div class="gacha-ball" id="ball">TAP</div>
<button class="button" onclick="pull()">GACHA</button>
<div class="result" id="result"></div>
<div class="score" id="score"></div>
<div class="reset" onclick="resetScore()">ハイスコアリセット</div>
</div>

<script>
let highScore = localStorage.getItem("highScore") || 0;
let totalScore = 0;
updateScore();

const bgm = new Audio();
bgm.loop = true;
bgm.src = "data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=";
bgm.volume = .2;
bgm.play().catch(()=>{});

function beep(freq,dur){
let ctx=new(window.AudioContext||window.webkitAudioContext)();
let osc=ctx.createOscillator();
let gain=ctx.createGain();
osc.type="sawtooth";
osc.frequency.value=freq;
osc.connect(gain);gain.connect(ctx.destination);
osc.start();
gain.gain.setValueAtTime(.2,ctx.currentTime);
gain.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+dur/1000);
osc.stop(ctx.currentTime+dur/1000);
}

function pull(){
const ball=document.getElementById("ball");
const result=document.getElementById("result");
ball.classList.add("shake");
result.textContent="";
beep(200,200);

setTimeout(()=>{
ball.classList.remove("shake");
const roll=Math.random();
let rarity,text,score;

if(roll<0.6){
rarity="COMMON";
text="🟦 コモン";
score=1;
}
else if(roll<0.85){
rarity="RARE";
text="🟪 レア!";
score=5;
}
else if(roll<0.97){
rarity="SUPER";
text="🟨 スーパーレア!!";
score=20;
flash();
particles(30);
beep(600,400);
}
else{
rarity="LEGEND";
text="🔥 レジェンド!!!";
score=100;
flash();
particles(80);
beep(1000,600);
}

result.textContent=text;
totalScore+=score;
if(totalScore>highScore){
highScore=totalScore;
localStorage.setItem("highScore",highScore);
}
updateScore();
},1200);
}

function updateScore(){
document.getElementById("score").innerHTML=
"TOTAL: "+totalScore+" | HIGH: "+highScore;
}

function resetScore(){
highScore=0;
localStorage.setItem("highScore",0);
updateScore();
}

function particles(n){
for(let i=0;i<n;i++){
let p=document.createElement("div");
p.className="particle";
p.style.width=p.style.height=Math.random()*8+4+"px";
p.style.background="hsl("+Math.random()*360+",100%,60%)";
p.style.left="50%";
p.style.top="40%";
p.style.setProperty("--x",(Math.random()*400-200)+"px");
p.style.setProperty("--y",(Math.random()*400-200)+"px");
document.body.appendChild(p);
setTimeout(()=>p.remove(),1000);
}
}

function flash(){
const f=document.getElementById("flash");
f.classList.add("active");
setTimeout(()=>f.classList.remove("active"),400);
}
</script>

</body>
</html>

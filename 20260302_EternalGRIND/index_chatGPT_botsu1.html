<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>星彩のゆりかご</title>
<style>
body{
margin:0;
font-family:"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;
background:radial-gradient(circle at center,#1b2735,#090a0f);
color:white;
overflow:hidden;
}
.screen{display:none;height:100vh;width:100vw;position:absolute;top:0;left:0;}
.active{display:flex;flex-direction:column;align-items:center;justify-content:center;}
h1{font-size:48px;letter-spacing:4px;}
button{
padding:12px 28px;
margin:8px;
border:none;
border-radius:25px;
font-size:16px;
cursor:pointer;
background:linear-gradient(45deg,#4facfe,#00f2fe);
color:#fff;
transition:0.2s;
}
button:hover{transform:scale(1.05);}
.card{
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(0,255,255,0.2);
}
.monster{
width:180px;height:180px;
border-radius:50%;
background:radial-gradient(circle at 30% 30%,#fff,#888);
box-shadow:0 0 40px rgba(255,255,255,0.6);
display:flex;align-items:center;justify-content:center;
font-size:20px;text-align:center;padding:20px;
}
.flash{animation:flash 0.5s;}
@keyframes flash{0%{background:white;}100%{background:transparent;}}
.shake{animation:shake 0.4s;}
@keyframes shake{
0%{transform:translate(0);}
25%{transform:translate(5px);}
50%{transform:translate(-5px);}
75%{transform:translate(5px);}
100%{transform:translate(0);}
}
.dark{animation:darken 0.6s;}
@keyframes darken{
0%{filter:brightness(1);}
100%{filter:brightness(0.2);}
}
.rainbow{
animation:rainbow 1s linear infinite;
}
@keyframes rainbow{
0%{box-shadow:0 0 40px red;}
25%{box-shadow:0 0 40px yellow;}
50%{box-shadow:0 0 40px lime;}
75%{box-shadow:0 0 40px cyan;}
100%{box-shadow:0 0 40px magenta;}
}
.log{
max-height:200px;
overflow:auto;
width:80%;
font-size:14px;
background:rgba(255,255,255,0.05);
padding:10px;
border-radius:10px;
}
</style>
</head>
<body>

<div id="title" class="screen active">
<h1>星彩のゆりかご</h1>
<button onclick="startGame()">ゲームを始める</button>
<div class="log" id="historyLog"></div>
</div>

<div id="game" class="screen">
<div class="card">
<div id="monster" class="monster">ひかりのたまご</div>
<h2 id="monsterName">ひかりのたまご</h2>
<p id="message">静かに鼓動している…</p>
<button onclick="feed()">エサ</button>
<button onclick="train()">トレーニング</button>
<button onclick="evolve()">成長</button>
</div>
</div>

<div id="gameover" class="screen">
<div class="card">
<h2>GAME OVER</h2>
<p id="gameoverText"></p>
<button onclick="backToTitle()">タイトルへ戻る</button>
</div>
</div>

<script>
let state;
let collection=JSON.parse(localStorage.getItem("collection")||"{}");
let history=JSON.parse(localStorage.getItem("history")||"[]");

const stages={
0:["ひかりのたまご","うたかたのたまご","星屑のたまご"],
1:{common:["ぽよぽよまる","もにょりん","ふわたね"],
rare:["ルミナペット","アストラルン"],
epic:["星屑の仔"],
legend:["始祖の幼体"]},
2:{common:["ひかりの獣","月影の獣"],
rare:["アークビースト"],
epic:["星界の守り手"],
legend:["天星の王"]},
3:{common:["幻光竜"],
rare:["天冥の覇者"],
epic:["神域の存在"],
legend:["星界創世神"]}
};

const gameoverTexts=[
"その進化は、まだ早すぎた。\n静かな光となって消えていった。",
"力を制御できなかった。\nその輝きは眩しすぎたのだ。",
"運命は残酷だ。\nそれでも彼は最後まで輝いていた。"
];

function startGame(){
state={
stage:0,
name:randomFrom(stages[0]),
feed:0,
train:0
};
showScreen("game");
updateUI();
}

function feed(){
if(Math.random()<0.03){
return death(`${state.name}はうっかり暴飲暴食をしてしまい、しにました。`);
}
state.feed++;
msg("エサを与えた。少し落ち着いたようだ。");
playSE("click");
}

function train(){
if(Math.random()<0.05){
return death(`${state.name}はトレーニングし過ぎで、しにました。`);
}
state.train++;
msg("トレーニングに成功した。力がみなぎる！");
playSE("click");
}

function evolve(){
let failChance=0.12-(state.feed*0.005);
if(failChance<0.01)failChance=0.01;
if(Math.random()<failChance){
return death(`${state.name}は成長に失敗しました。\nどうやらもうこれ以上成長できないようです。`);
}

let rarityRoll=Math.random();
let bonus=Math.min(0.10,Math.floor(state.train/3)*0.01);
rarityRoll-=bonus;

let rarity="common";
if(rarityRoll<0.02)rarity="legend";
else if(rarityRoll<0.10)rarity="epic";
else if(rarityRoll<0.35)rarity="rare";

state.stage++;
if(!stages[state.stage]){
return death(`${state.name}は最終進化を遂げ、天寿をまっとうしました。`);
}

let newName=randomFrom(stages[state.stage][rarity]);
state.name=newName;
collection[newName]=true;
localStorage.setItem("collection",JSON.stringify(collection));
animateEvolution(rarity);
state.feed=0;
state.train=0;
updateUI();
}

function animateEvolution(rarity){
let m=document.getElementById("monster");
m.classList.add("flash");
if(rarity!=="common"){
m.classList.add("dark");
m.classList.add("shake");
}
if(rarity==="legend"){
m.classList.add("rainbow");
}
setTimeout(()=>{m.className="monster";},800);
playSE(rarity==="legend"?"rare":"evolve");
}

function death(text){
let final=text+"\n\n"+randomFrom(gameoverTexts);
history.unshift({date:new Date().toLocaleString(),name:state.name});
localStorage.setItem("history",JSON.stringify(history));
document.getElementById("gameoverText").innerText=final;
showScreen("gameover");
}

function backToTitle(){
showScreen("title");
loadHistory();
}

function updateUI(){
document.getElementById("monsterName").innerText=state.name;
document.getElementById("monster").innerText=state.name;
}

function msg(t){document.getElementById("message").innerText=t;}

function showScreen(id){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function randomFrom(arr){return arr[Math.floor(Math.random()*arr.length)];}

function loadHistory(){
let log=document.getElementById("historyLog");
log.innerHTML="<b>転生履歴</b><br>";
history.forEach(h=>{
log.innerHTML+=`${h.date} - ${h.name}<br>`;
});
}
loadHistory();

function playSE(name){
let audio=new Audio(`sounds/${name}.mp3`);
audio.onerror=()=>fallbackBeep();
audio.play().catch(()=>fallbackBeep());
}
function fallbackBeep(){
let ctx=new(window.AudioContext||window.webkitAudioContext)();
let o=ctx.createOscillator();
o.connect(ctx.destination);
o.start();
o.stop(ctx.currentTime+0.1);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ETERNAL GRIND EVOLUTION - PREMIUM</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --neon-pink: #ff00ff;
            --neon-gold: #ffcc00;
            --bg-dark: #0a0a0a;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Hiragino Kaku Gothic Pro', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        #game-container {
            width: 420px;
            height: 750px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border: 4px solid #333;
            border-radius: 30px;
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* 画面レイアウト */
        .screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; padding: 20px; text-align: center; }
        .active { display: flex; }

        /* 卵選択画面の改善 */
        .egg-container { display: flex; justify-content: space-around; width: 100%; margin-top: 20px; }
        .egg-item { display: flex; flex-direction: column; align-items: center; }
        .egg-visual { font-size: 50px; margin-bottom: 10px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* ボタンデザイン */
        .btn {
            background: rgba(0,0,0,0.6);
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            padding: 12px 20px;
            margin: 8px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            min-width: 100px;
        }
        .btn:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px var(--neon-blue); }

        /* モンスター表示 */
        .monster-box {
            width: 250px;
            height: 250px;
            margin: 20px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            transition: 0.5s;
        }
        .aura { position: absolute; width: 110%; height: 110%; border-radius: 50%; filter: blur(15px); opacity: 0.6; z-index: -1; }
        .monster-emoji { font-size: 100px; z-index: 1; }

        /* パチンコ風カットイン */
        #cutin {
            position: absolute;
            top: 50%;
            left: -100%;
            width: 200%;
            height: 80px;
            background: linear-gradient(90deg, transparent, var(--neon-pink), transparent);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            transform: rotate(-10deg);
            z-index: 100;
            pointer-events: none;
        }
        .cutin-anim { animation: cutin-move 0.8s ease-in-out forwards; }
        @keyframes cutin-move { 0% { left: -100%; } 50% { left: -20%; } 100% { left: 150%; } }

        /* ログ・ステータス */
        #log { height: 100px; font-size: 0.9rem; overflow-y: auto; color: #aaa; padding: 10px; border-top: 1px solid #333; width: 100%; box-sizing: border-box; }
        .status-row { display: flex; gap: 10px; font-size: 0.8rem; color: var(--neon-gold); margin-bottom: 5px; }

        /* 履歴 */
        #history { max-height: 150px; overflow-y: auto; font-size: 0.7rem; width: 100%; background: rgba(255,255,255,0.05); padding: 5px; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="cutin">RAINBOW EVOLUTION!!</div>

    <div id="screen-title" class="screen active">
        <h1 style="text-shadow: 0 0 10px var(--neon-pink);">ETERNAL<br>GRIND</h1>
        <button class="btn" onclick="showScreen('screen-select')">GAME START</button>
        <div id="history"></div>
    </div>

    <div id="screen-select" class="screen">
        <h2>系統を選択せよ</h2>
        <div class="egg-container">
            <div class="egg-item">
                <div class="egg-visual">🥚</div>
                <button class="btn" onclick="hatch('CASINO')">CASINO</button>
            </div>
            <div class="egg-item">
                <div class="egg-visual">🥚</div>
                <button class="btn" onclick="hatch('CYBER')">CYBER</button>
            </div>
            <div class="egg-item">
                <div class="egg-visual">🥚</div>
                <button class="btn" onclick="hatch('SLIME')">SLIME</button>
            </div>
        </div>
    </div>

    <div id="screen-main" class="screen">
        <div id="title-display" style="color: var(--neon-blue); font-size: 0.9rem;"></div>
        <div id="name-display" style="font-size: 1.5rem; font-weight: bold;"></div>
        
        <div class="monster-box" id="monster-box">
            <div id="aura-effect" class="aura"></div>
            <div id="monster-emoji" class="monster-emoji">🐣</div>
        </div>

        <div class="status-row">
            <span>LV: <span id="lv-val">1</span></span>
            <span>HP: <span id="hp-val">100</span></span>
            <span>ATK: <span id="atk-val">10</span></span>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; width: 100%;">
            <button class="btn" onclick="action('food')">エサ</button>
            <button class="btn" onclick="action('train')">訓練</button>
            <button class="btn" onclick="evolve()" style="grid-column: span 2; border-color: var(--neon-gold); color: var(--neon-gold);">進 化 (EVOLVE)</button>
        </div>
        <div id="log">運命をタップせよ...</div>
    </div>

    <div id="screen-over" class="screen">
        <h2 id="over-msg" style="color: #ff4444;">死亡</h2>
        <p id="over-desc" style="font-size: 0.8rem;"></p>
        <button class="btn" onclick="location.reload()">タイトルへ</button>
    </div>
</div>

<script>
// --- 設定・データ ---
const USE_GAMBLE_DOPING = true; // スロット/ギャンブル要素の有効フラグ
const TITLES = ["風来の", "黄金の", "奈落の", "禁忌の", "ただならぬ", "爆裂の", "伝説の", "社畜の", "光速の", "虚無を識る", "至高の", "週末の", "呪われし", "超越した", "迷子の", "絶対零度の", "裏切りの", "幸運の", "限界突破した", "うっかり"];
const AURA_COLORS = [
    { name: "無", color: "transparent", power: 0 },
    { name: "白", color: "#fff", power: 1 },
    { name: "青", color: "#44f", power: 2 },
    { name: "緑", color: "#4f4", power: 3 },
    { name: "赤", color: "#f44", power: 4 },
    { name: "虹", color: "linear-gradient(45deg, red, orange, yellow, green, blue, indigo, violet)", power: 5 }
];

const MONSTER_MASTER = {
    CASINO: [{lv:1, name:"子猫", emo:"🐱"}, {lv:2, name:"チンピラ猫", emo:"🕶️"}, {lv:3, name:"用心棒猫", emo:"👔"}, {lv:4, name:"スロット猫", emo:"🎰"}, {lv:5, name:"カジノ神", emo:"💰"}],
    CYBER: [{lv:1, name:"ビット卵", emo:"🥚"}, {lv:2, name:"コードベビ", emo:"👾"}, {lv:3, name:"プロトドロ", emo:"🤖"}, {lv:4, name:"守護機甲", emo:"🛡️"}, {lv:5, name:"機神オメガ", emo:"👑"}],
    SLIME: [{lv:1, name:"ベビスラ", emo:"💧"}, {lv:2, name:"スライム", emo:"🔵"}, {lv:3, name:"キングスラ", emo:"👑"}, {lv:4, name:"メタルスラ", emo:"💎"}, {lv:5, name:"プラチナK", emo:"✨"}]
};

let state = {
    type: "", lv: 1, name: "", emo: "🐣", title: "", 
    color: AURA_COLORS[0],
    hp: 100, atk: 10, def: 10,
    food: 0, train: 0,
    history: JSON.parse(localStorage.getItem('grind_history') || '[]')
};

// --- コアロジック ---
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function hatch(type) {
    state.type = type;
    const data = MONSTER_MASTER[type][0];
    state.name = data.name;
    state.emo = data.emo;
    updateUI();
    showScreen('screen-main');
    addLog(`${type}系の卵が孵化した！`);
}

function action(type) {
    if(Math.random() < 0.05) {
        die(type === 'food' ? "暴飲暴食で内臓が爆発した！" : "訓練のしすぎで心臓が止まった！");
        return;
    }
    if(type === 'food') { state.food++; addLog("ムシャムシャ...生存率が上がった。"); }
    else { state.train++; addLog("ハァハァ...才能が開花しやすくなった。"); }
    updateUI();
}

function evolve() {
    // 成功判定
    let successChance = 0.7 + (state.food * 0.05);
    if(Math.random() > successChance) {
        die("進化の負荷に耐えきれず、電子の塵となった...");
        return;
    }

    // 確定：レベルアップ
    state.lv++;

    // 1. 種族進化抽選 (50%)
    const currentList = MONSTER_MASTER[state.type];
    const currentIndex = currentList.findIndex(m => m.name === state.name);
    if(Math.random() < 0.5 && currentIndex < currentList.length - 1) {
        const next = currentList[currentIndex + 1];
        state.name = next.name;
        state.emo = next.emo;
        addLog(`種族進化！【${state.name}】になった！`);
    }

    // 2. オーラ抽選
    if(Math.random() < 0.4) {
        let r = Math.random();
        let newColor;
        if(r < 0.05) newColor = AURA_COLORS[5]; // 虹
        else if(r < 0.15) newColor = AURA_COLORS[4]; // 赤
        else if(r < 0.3) newColor = AURA_COLORS[3]; // 緑
        else if(r < 0.6) newColor = AURA_COLORS[2]; // 青
        else newColor = AURA_COLORS[1]; // 白

        if(newColor.power > state.color.power) {
            state.color = newColor;
            addLog(`オーラ昇格！【${newColor.name}】を纏った！`);
            if(newColor.name === "虹") playCutin("RAINBOW OVERLOAD!!");
        }
    }

    // 3. 二つ名抽選 (30%)
    if(Math.random() < 0.3) {
        state.title = TITLES[Math.floor(Math.random() * TITLES.length)];
        addLog(`二つ名【${state.title}】を授かった！`);
    }

    // ステータス上昇
    state.hp += 20 + Math.floor(Math.random() * 30);
    state.atk += 5 + state.train + Math.floor(Math.random() * 5);
    
    state.food = 0; state.train = 0;
    updateUI();
}

function die(reason) {
    document.getElementById('over-desc').innerText = reason;
    const record = { date: new Date().toLocaleTimeString(), name: `${state.title}${state.name}`, lv: state.lv };
    state.history.unshift(record);
    localStorage.setItem('grind_history', JSON.stringify(state.history.slice(0, 10)));
    showScreen('screen-over');
}

function updateUI() {
    document.getElementById('name-display').innerText = state.name;
    document.getElementById('title-display').innerText = state.title;
    document.getElementById('monster-emoji').innerText = state.emo;
    document.getElementById('lv-val').innerText = state.lv;
    document.getElementById('hp-val').innerText = state.hp;
    document.getElementById('atk-val').innerText = state.atk;
    
    const aura = document.getElementById('aura-effect');
    aura.style.background = state.color.color;
    
    renderHistory();
}

function addLog(msg) {
    const log = document.getElementById('log');
    log.innerHTML = `> ${msg}<br>` + log.innerHTML;
}

function playCutin(text) {
    const c = document.getElementById('cutin');
    c.innerText = text;
    c.classList.add('cutin-anim');
    setTimeout(() => c.classList.remove('cutin-anim'), 1000);
}

function renderHistory() {
    const h = document.getElementById('history');
    h.innerHTML = "<b>[過去の英霊]</b><br>" + state.history.map(x => `${x.date} Lv.${x.lv} ${x.name}`).join("<br>");
}

renderHistory();
</script>
</body>
</html>

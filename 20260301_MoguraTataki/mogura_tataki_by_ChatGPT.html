<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>究極もぐら叩き</title>
<style>
body{
  margin:0;
  font-family:sans-serif;
  text-align:center;
  background:linear-gradient(#7ec8e3,#4aa3d8);
  color:#fff;
  overflow-x:hidden;
}
h1{margin-top:15px;}
.top-ui{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
}
.card{
  background:#ffffff22;
  padding:8px 15px;
  border-radius:15px;
}
button{
  padding:8px 18px;
  margin:5px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
#game{
  display:grid;
  grid-template-columns:repeat(3,100px);
  gap:20px;
  justify-content:center;
  margin-top:20px;
}
.hole{
  width:100px;
  height:100px;
  border-radius:50%;
  background:radial-gradient(circle at 50% 40%, #5b2c1d,#2e130b);
  position:relative;
  overflow:hidden;
}
.mole{
  position:absolute;
  bottom:-100%;
  left:50%;
  transform:translateX(-50%);
  font-size:45px;
  transition:bottom .2s;
}
.mole.up{ bottom:10px; }
.hitEffect{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(255,255,255,.3);
  border-radius:50%;
  animation:flash .2s;
}
@keyframes flash{
  from{opacity:1;}
  to{opacity:0;}
}
#modal{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:#000a;
  display:none;
  justify-content:center;
  align-items:center;
}
.modalContent{
  background:#fff;
  color:#000;
  padding:20px;
  border-radius:10px;
}
.countdown{
  font-size:50px;
  margin-top:20px;
}
</style>
</head>
<body>

<h1>🐹 究極もぐら叩き</h1>

<div class="top-ui">
  <div class="card">スコア:<span id="score">0</span></div>
  <div class="card">時間:<span id="time">30</span></div>
  <div class="card">ハイスコア:<span id="high">0</span></div>
</div>

<button onclick="startCountdown()">スタート</button>
<button onclick="resetHigh()">ハイスコアリセット</button>

<div class="countdown" id="countdown"></div>

<div id="game"></div>

<div id="modal">
  <div class="modalContent">
    <h2>結果発表</h2>
    <p id="resultText"></p>
    <button onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
const game=document.getElementById("game");
const scoreEl=document.getElementById("score");
const timeEl=document.getElementById("time");
const highEl=document.getElementById("high");
const modal=document.getElementById("modal");
const resultText=document.getElementById("resultText");
const countdownEl=document.getElementById("countdown");

let score=0,time=30,timer,moleTimer,current=null;
let high=localStorage.getItem("highV2")||0;
highEl.textContent=high;

function createBoard(){
  game.innerHTML="";
  for(let i=0;i<9;i++){
    const hole=document.createElement("div");
    hole.className="hole";
    const m=document.createElement("div");
    m.className="mole";
    hole.appendChild(m);
    hole.onclick=()=>hit(m,hole);
    game.appendChild(hole);
  }
}
createBoard();

function spawn(){
  const moles=document.querySelectorAll(".mole");
  moles.forEach(m=>{m.classList.remove("up");});
  const index=Math.floor(Math.random()*moles.length);
  const r=Math.random();
  const m=moles[index];

  if(r<0.7){ m.textContent="🐹"; m.dataset.type="normal"; }
  else if(r<0.85){ m.textContent="💣"; m.dataset.type="bomb"; }
  else{ m.textContent="🐸"; m.dataset.type="rare"; }

  m.classList.add("up");
  current=m;
}

function hit(m,hole){
  if(!m.classList.contains("up"))return;

  const effect=document.createElement("div");
  effect.className="hitEffect";
  hole.appendChild(effect);
  setTimeout(()=>effect.remove(),200);

  if(m.dataset.type==="normal"){ score++; playHit(); }
  if(m.dataset.type==="bomb"){ score-=2; playBad(); }
  if(m.dataset.type==="rare"){ score+=5; playRare(); }

  scoreEl.textContent=score;
  m.classList.remove("up");
}

function startCountdown(){
  let c=3;
  countdownEl.textContent=c;
  const cd=setInterval(()=>{
    c--;
    if(c<=0){
      clearInterval(cd);
      countdownEl.textContent="GO!";
      setTimeout(()=>countdownEl.textContent="",500);
      startGame();
    }else{
      countdownEl.textContent=c;
    }
  },1000);
}

function startGame(){
  score=0;
  time=30;
  scoreEl.textContent=0;
  timeEl.textContent=time;
  playBGM();

  timer=setInterval(()=>{
    time--;
    timeEl.textContent=time;
    if(time<=0) endGame();
  },1000);

  moleTimer=setInterval(spawn,700);
}

function endGame(){
  clearInterval(timer);
  clearInterval(moleTimer);
  stopBGM();

  if(score>high){
    high=score;
    localStorage.setItem("highV2",high);
    highEl.textContent=high;
  }

  resultText.textContent="あなたのスコアは "+score+" 点！";
  modal.style.display="flex";
}

function closeModal(){ modal.style.display="none"; }

function resetHigh(){
  localStorage.removeItem("highV2");
  high=0;
  highEl.textContent=0;
}

function playHit(){ beep(500); }
function playBad(){ beep(150); }
function playRare(){ beep(900); }

function beep(freq){
  const ctx=new(window.AudioContext||window.webkitAudioContext)();
  const osc=ctx.createOscillator();
  osc.frequency.value=freq;
  osc.connect(ctx.destination);
  osc.start();
  osc.stop(ctx.currentTime+0.1);
}

let bgmCtx,osc;
function playBGM(){
  bgmCtx=new(window.AudioContext||window.webkitAudioContext)();
  osc=bgmCtx.createOscillator();
  osc.frequency.value=220;
  osc.type="sine";
  osc.connect(bgmCtx.destination);
  osc.start();
}
function stopBGM(){ if(osc) osc.stop(); }

</script>
</body>
</html>
